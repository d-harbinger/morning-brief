# Morning Brief config
# Edit via the web UI (run ./brief-web.sh) or by hand — both work.

ollama:
  host: "http://localhost:11434"
  model: "qwen2.5:3b-instruct"

# How far back to look for new items in each feed
lookback_hours: 24

# Cap items fetched per feed (prevents one noisy feed from dominating)
per_feed_limit: 10

# Cap on final digest size after LLM filtering
max_digest_items: 10

# Free-text description of what you care about.
# The LLM uses this as flavor when summarizing — be specific.
interests: |
  Local LLMs, agent tooling, AI model releases, prompt engineering.
  Software engineering, Linux desktop, kernel news, Rust, Python.
  Privacy tech, cybersecurity, data breaches, self-hosting.
  NOT interested in: crypto price speculation, consumer gadget rumors
  (phone cases, earbuds), celebrity news, sports scores, stock picks,
  NFTs, AI hype pieces with no substance.

# Where to write the brief. Date is appended automatically:
#   output/brief-2026-04-16.txt  (and .html)
output_path: "output/brief.txt"

# Feeds to pull from. Any RSS/Atom URL works.
# Tip: to disable a feed temporarily, comment out its lines.
feeds:
  # Aggregators
  - name: "Hacker News"
    url: "https://news.ycombinator.com/rss"

  # Tech news
  - name: "The Verge"
    url: "https://www.theverge.com/rss/index.xml"
  - name: "Ars Technica"
    url: "https://feeds.arstechnica.com/arstechnica/index"
  - name: "404 Media"
    url: "https://www.404media.co/rss/"
  - name: "The Register"
    url: "https://www.theregister.com/headlines.atom"

  # Linux / systems
  - name: "Phoronix"
    url: "https://www.phoronix.com/rss.php"
  - name: "LWN"
    url: "https://lwn.net/headlines/rss"

  # Security / privacy
  - name: "Krebs on Security"
    url: "https://krebsonsecurity.com/feed/"
  - name: "Schneier on Security"
    url: "https://www.schneier.com/feed/atom/"

  # Lobsters removed — times out consistently from many regions.
  # - name: "Lobsters"
  #   url: "https://lobste.rs/rss"
